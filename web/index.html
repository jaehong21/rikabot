<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rika</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-tertiary: #16213e;
    --bg-input: #1c1c30;
    --text-primary: #e0e0e8;
    --text-secondary: #9a9ab0;
    --text-muted: #6a6a80;
    --accent: #4a6cf7;
    --accent-hover: #5a7df8;
    --user-bg: #2a3a6e;
    --assistant-bg: #1e1e36;
    --tool-bg: #151528;
    --tool-border: #2a2a4a;
    --success: #4ade80;
    --error: #f87171;
    --border: #2a2a44;
    --scrollbar-thumb: #3a3a5a;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
  }

  /* -- Header ---------------------------------------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--success);
    transition: background 0.3s;
  }

  #status-dot.disconnected { background: var(--error); }

  /* -- Messages area --------------------------------- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 0.94rem;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border-bottom-left-radius: 4px;
  }

  .msg.assistant code {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.88em;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  .msg.assistant pre {
    background: rgba(0,0,0,0.3);
    padding: 10px 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 0.86em;
    line-height: 1.5;
  }

  .msg.assistant pre code {
    background: none;
    padding: 0;
  }

  /* -- Tool call blocks ------------------------------ */
  .tool-block {
    align-self: flex-start;
    max-width: 85%;
    border: 1px solid var(--tool-border);
    border-radius: var(--radius);
    overflow: hidden;
    font-size: 0.88rem;
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--tool-bg);
    cursor: pointer;
    user-select: none;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.84rem;
    color: var(--text-secondary);
    transition: background 0.15s;
  }

  .tool-header:hover { background: #1a1a34; }

  .tool-header .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .tool-header .arrow.open { transform: rotate(90deg); }

  .tool-header .tool-label { font-weight: 600; color: var(--accent); }

  .tool-header .tool-status {
    margin-left: auto;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .tool-header .tool-status.running { color: var(--text-muted); }
  .tool-header .tool-status.success { color: var(--success); }
  .tool-header .tool-status.failure { color: var(--error); }

  .tool-body {
    display: none;
    padding: 10px 14px;
    background: #111122;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.82rem;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.5;
  }

  .tool-body::-webkit-scrollbar { width: 4px; }
  .tool-body::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .tool-body.open { display: block; }

  .tool-body .tool-section-label {
    display: block;
    margin-bottom: 4px;
    color: var(--text-muted);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .tool-body .tool-section + .tool-section { margin-top: 10px; }

  /* -- Typing indicator ------------------------------ */
  .typing-indicator {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--assistant-bg);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  /* -- Input area ------------------------------------ */
  #input-area {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.94rem;
    padding: 12px 16px;
    line-height: 1.5;
    max-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }
  #user-input:disabled { opacity: 0.5; }

  #send-btn {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }

  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:active { transform: scale(0.95); }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  #send-btn svg {
    width: 20px; height: 20px;
    fill: currentColor;
  }

  /* -- Reconnecting overlay -------------------------- */
  #reconnect-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 20, 0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  #reconnect-overlay.visible { display: flex; }

  #reconnect-overlay .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #reconnect-overlay p {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  /* -- Welcome message ------------------------------- */
  .welcome {
    align-self: center;
    text-align: center;
    padding: 48px 20px 24px;
    color: var(--text-muted);
  }

  .welcome h2 {
    font-size: 1.4rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .welcome p {
    font-size: 0.9rem;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Rika</h1>
    <div id="status-dot" title="Connected"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <h2>Welcome to Rika</h2>
      <p>Type a message below to start a conversation.<br>Rika can execute shell commands and help with tasks.</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Send a message..." autofocus></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="reconnect-overlay">
  <div class="spinner"></div>
  <p>Reconnecting...</p>
</div>

<script>
(function() {
  'use strict';

  // -- DOM refs --
  var messagesEl = document.getElementById('messages');
  var inputEl    = document.getElementById('user-input');
  var sendBtn    = document.getElementById('send-btn');
  var statusDot  = document.getElementById('status-dot');
  var overlay    = document.getElementById('reconnect-overlay');

  // -- State --
  var ws = null;
  var isWaiting = false;
  var reconnectTimer = null;
  var reconnectDelay = 1000;
  var currentAssistantEl = null;
  var currentText = '';

  // -- WebSocket connection --
  function connect() {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/ws';
    ws = new WebSocket(url);

    ws.onopen = function() {
      statusDot.className = '';
      statusDot.title = 'Connected';
      overlay.classList.remove('visible');
      reconnectDelay = 1000;
    };

    ws.onclose = function() {
      statusDot.className = 'disconnected';
      statusDot.title = 'Disconnected';
      scheduleReconnect();
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(e) {
      var data;
      try { data = JSON.parse(e.data); } catch(_) { return; }
      handleEvent(data);
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    overlay.classList.add('visible');
    reconnectTimer = setTimeout(function() {
      reconnectTimer = null;
      connect();
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
    }, reconnectDelay);
  }

  // -- Event dispatch --
  function handleEvent(data) {
    switch (data.type) {
      case 'chunk':
        onChunk(data.content || '');
        break;
      case 'tool_call_start':
        onToolCallStart(data.name || '', data.args || '');
        break;
      case 'tool_call_result':
        onToolCallResult(data.name || '', data.output || '', data.success);
        break;
      case 'done':
        onDone(data.full_response || '');
        break;
      case 'error':
        onError(data.message || 'Unknown error');
        break;
    }
  }

  // -- Chunk: streaming text from the assistant --
  function onChunk(text) {
    removeTypingIndicator();
    if (!currentAssistantEl) {
      currentAssistantEl = createBubble('assistant');
      currentText = '';
    }
    currentText += text;
    renderMarkdown(currentAssistantEl, currentText);
    scrollToBottom();
  }

  // -- Tool call started --
  function onToolCallStart(name, argsStr) {
    removeTypingIndicator();
    finishCurrentBubble();

    var prettyArgs = argsStr;
    try {
      prettyArgs = JSON.stringify(JSON.parse(argsStr), null, 2);
    } catch(_) {}

    var block = document.createElement('div');
    block.className = 'tool-block';
    block.dataset.toolName = name;
    block.dataset.resolved = 'false';

    var header = document.createElement('div');
    header.className = 'tool-header';
    header.innerHTML =
      '<span class="arrow">&#9654;</span>' +
      '<span class="tool-label">' + escapeHtml(name) + '</span>' +
      '<span class="tool-status running">running...</span>';

    var body = document.createElement('div');
    body.className = 'tool-body';

    var argsSection = document.createElement('div');
    argsSection.className = 'tool-section';
    argsSection.innerHTML =
      '<span class="tool-section-label">Arguments</span>' +
      escapeHtml(prettyArgs);
    body.appendChild(argsSection);

    header.addEventListener('click', function() {
      var arrow = header.querySelector('.arrow');
      var isOpen = body.classList.toggle('open');
      if (isOpen) {
        arrow.classList.add('open');
      } else {
        arrow.classList.remove('open');
      }
    });

    block.appendChild(header);
    block.appendChild(body);
    messagesEl.appendChild(block);
    scrollToBottom();
  }

  // -- Tool call result --
  function onToolCallResult(name, output, success) {
    // Find the most recent unresolved tool block matching the name
    var blocks = messagesEl.querySelectorAll('.tool-block');
    var block = null;
    for (var i = blocks.length - 1; i >= 0; i--) {
      if (blocks[i].dataset.toolName === name && blocks[i].dataset.resolved === 'false') {
        block = blocks[i];
        break;
      }
    }

    if (block) {
      block.dataset.resolved = 'true';

      var statusEl = block.querySelector('.tool-status');
      if (statusEl) {
        statusEl.textContent = success ? 'success' : 'failed';
        statusEl.className = 'tool-status ' + (success ? 'success' : 'failure');
      }

      var body = block.querySelector('.tool-body');
      if (body && output) {
        var resultSection = document.createElement('div');
        resultSection.className = 'tool-section';
        resultSection.innerHTML =
          '<span class="tool-section-label">Output</span>' +
          escapeHtml(output);
        body.appendChild(resultSection);
      }
    }
    scrollToBottom();
  }

  // -- Agent done --
  function onDone(fullResponse) {
    removeTypingIndicator();

    if (currentAssistantEl) {
      // We had streaming chunks; update with full final text
      renderMarkdown(currentAssistantEl, fullResponse);
      currentAssistantEl = null;
      currentText = '';
    } else if (fullResponse) {
      // No chunks were sent; create the full bubble now
      var bubble = createBubble('assistant');
      renderMarkdown(bubble, fullResponse);
    }

    setWaiting(false);
    scrollToBottom();
  }

  // -- Error --
  function onError(message) {
    removeTypingIndicator();
    finishCurrentBubble();

    var el = document.createElement('div');
    el.className = 'msg assistant';
    el.style.borderLeft = '3px solid var(--error)';
    el.textContent = 'Error: ' + message;
    messagesEl.appendChild(el);

    setWaiting(false);
    scrollToBottom();
  }

  // -- DOM helpers --
  function createBubble(role) {
    var el = document.createElement('div');
    el.className = 'msg ' + role;
    messagesEl.appendChild(el);
    return el;
  }

  function finishCurrentBubble() {
    currentAssistantEl = null;
    currentText = '';
  }

  function renderMarkdown(el, text) {
    var html = escapeHtml(text);

    // Fenced code blocks: ```lang\n...\n```
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
      return '<pre><code>' + code + '</code></pre>';
    });

    // Inline code: `...`
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    // Bold: **...**
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic: *...* (not preceded or followed by *)
    html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

    el.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function showTypingIndicator() {
    if (messagesEl.querySelector('.typing-indicator')) return;
    var el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    var el = messagesEl.querySelector('.typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function setWaiting(val) {
    isWaiting = val;
    sendBtn.disabled = val;
    if (val) {
      inputEl.setAttribute('disabled', '');
    } else {
      inputEl.removeAttribute('disabled');
      inputEl.focus();
    }
  }

  function removeWelcome() {
    var w = messagesEl.querySelector('.welcome');
    if (w) w.remove();
  }

  // -- Send message --
  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || isWaiting) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    removeWelcome();

    var bubble = createBubble('user');
    bubble.textContent = text;

    inputEl.value = '';
    autoResize();

    ws.send(JSON.stringify({ type: 'message', content: text }));

    setWaiting(true);
    showTypingIndicator();
    scrollToBottom();
  }

  // -- Auto-resize textarea --
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  }

  // -- Event listeners --
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', autoResize);

  // -- Init --
  connect();
})();
</script>
</body>
</html>
