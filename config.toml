# -----------------------------------------------------------------------------
# Rikabot config template
# Most settings below show defaults as comments. Uncomment to override.
# -----------------------------------------------------------------------------

# host = "127.0.0.1"
# port = 4728
# system_prompt = "You are Rika, a helpful personal AI assistant. You can execute shell commands using the shell tool when needed."
# temperature = 0.1

workspace_dir = "./workspace" # default: ~/.rika/workspace

# provider is required (no default)
provider = "openai"
model = "gpt-5.2"

[providers.openai]
base_url = "http://localhost:8317/v1" # default: https://api.openai.com/v1
# env_key = "OPENAI_API_KEY"
api_key = "xxx"

[permissions]
enabled = true

# [providers.openrouter]
