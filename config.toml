[[mcp.servers]]
name = "linear"
transport = "http"
auth_mode = "oauth" # "headers" | "oauth"
url = "https://mcp.linear.app/mcp"
# For headers mode
# headers = { Authorization = "Bearer ${LINEAR_API_KEY}" }
# For oauth mode, client_id is optional when provider supports dynamic client registration.
# oauth_client_id = "your-client-id"
# oauth_client_secret_env = "LINEAR_OAUTH_CLIENT_SECRET"
# oauth_scopes = ["read"]
# oauth_authorization_server = "https://mcp.linear.app"

[[mcp.servers]]
name = "notion"
transport = "http"
auth_mode = "oauth"
url = "https://mcp.notion.com/mcp"
