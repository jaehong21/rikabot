# -----------------------------------------------------------------------------
# Rikabot config template
# Most settings below show defaults as comments. Uncomment to override.
# -----------------------------------------------------------------------------

# host = "127.0.0.1"           # default
# port = 4728                  # default
# system_prompt = "You are Rika, a helpful personal AI assistant. You can execute shell commands using the shell tool when needed." # default
# model = "openai/gpt-5.2"     # default
# temperature = 0.1            # default
# workspace_dir = "./workspace" # default resolves to ~/.rika/workspace when omitted

# provider is required (no default)
provider = "openai"

[providers.openai]
# api_key = "YOUR_OPENAI_API_KEY"
env_key = "OPENAI_API_KEY"
